<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161921"/>
      <stop offset="100%" style="stop-color:#0d0f14"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fffb0;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#4fffb0;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#4fffb0" flood-opacity="0.35"/>
    </filter>
    <filter id="glow-text">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4fffb0" flood-opacity="0.7"/>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g clip-path="url(#round)" opacity="0.07">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#4fffb0" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#4fffb0" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#4fffb0" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#4fffb0" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#4fffb0" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#4fffb0" stroke-width="1"/>
  </g>

  <!-- Glow blob in top-right -->
  <circle cx="380" cy="140" r="120" fill="url(#glow)" clip-path="url(#round)"/>

  <!-- Bar chart bars (main visual) -->
  <!-- Bar 1 -->
  <rect x="80" y="310" width="52" height="110" rx="8" fill="#4fffb0" opacity="0.5" filter="url(#shadow)"/>
  <!-- Bar 2 -->
  <rect x="152" y="260" width="52" height="160" rx="8" fill="#4fffb0" opacity="0.65"/>
  <!-- Bar 3 - tallest = highlight -->
  <rect x="224" y="185" width="52" height="235" rx="8" fill="#4fffb0" filter="url(#shadow)"/>
  <!-- Bar 4 - over limit, red -->
  <rect x="296" y="230" width="52" height="190" rx="8" fill="#ff6b6b" opacity="0.85"/>
  <!-- Bar 5 -->
  <rect x="368" y="275" width="52" height="145" rx="8" fill="#4fffb0" opacity="0.55"/>

  <!-- Limit line (dashed) -->
  <line x1="68" y1="210" x2="444" y2="210" stroke="#ffd166" stroke-width="5" stroke-dasharray="14,8" opacity="0.9"/>
  <!-- Limit dot marker -->
  <circle cx="68" cy="210" r="7" fill="#ffd166"/>
  <circle cx="444" cy="210" r="7" fill="#ffd166"/>

  <!-- CHF symbol at top left -->
  <text x="72" y="118" font-family="Georgia, serif" font-size="68" font-weight="700"
        fill="#4fffb0" filter="url(#glow-text)" opacity="0.95">₣</text>

  <!-- Bottom baseline -->
  <line x1="68" y1="430" x2="444" y2="430" stroke="#2a2f40" stroke-width="3" stroke-linecap="round"/>
</svg>
